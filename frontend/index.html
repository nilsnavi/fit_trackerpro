        <!-- Force SW update: unregister stale workers and clear old caches -->
        <script>
            (function () {
                var CACHE_VERSION = '2026-04-02-v2';
                var CACHE_KEY = 'sw_cache_version';
                var stored = localStorage.getItem(CACHE_KEY);
                if (stored !== CACHE_VERSION) {
                    localStorage.setItem(CACHE_KEY, CACHE_VERSION);
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then(function (regs) {
                            regs.forEach(function (reg) { reg.unregister(); });
                        });
                    }
                    if ('caches' in window) {
                        caches.keys().then(function (keys) {
                            keys.forEach(function (key) { caches.delete(key); });
                        });
                    }
                }
            })();
        </script>
