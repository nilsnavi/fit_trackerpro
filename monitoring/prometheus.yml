# FitTracker monitoring — только то, что реально поднимается в docker-compose.monitoring.yml
# + backend на сети fittracker-network. Экспортёры Postgres/Redis подключайте отдельным
# файлом или добавьте job ниже, когда сервисы появятся в compose.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "fittracker-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Хост: CPU, память, диск, сеть — база для «почему тормозит»
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Контейнеры: CPU/RSS по сервисам compose (тяжёлый таргет — реже скрейпим)
  - job_name: "cadvisor"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  # API: HTTP RPS, латентность, коды ответа (эндпоинт /metrics в приложении)
  - job_name: "fittracker-backend"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["backend:8000"]

