# Удобная копия конфигурации для локального Prometheus **без** entrypoint:
# подставьте вместо плейсхолдеров реальные значения или скопируйте из .template после sed.
#
# В Docker используйте ``prometheus.yml.template`` + ``prometheus-entrypoint.sh``
# (см. ``docker-compose.monitoring.yml``).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "fittracker-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "fittracker-backend"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "blackbox-http-ready"
    metrics_path: /probe
    scrape_interval: 15s
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://backend:8000/api/v1/system/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
