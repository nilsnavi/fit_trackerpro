version: '3.8'

services:
  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: fittracker-prometheus
    restart: unless-stopped
    environment:
      FITTRACKER_BACKEND_SCRAPE_TARGET: ${FITTRACKER_BACKEND_SCRAPE_TARGET:-backend:8000}
      FITTRACKER_BACKEND_READINESS_URL: ${FITTRACKER_BACKEND_READINESS_URL:-http://backend:8000/api/v1/system/ready}
    entrypoint: ["/bin/sh", "/etc/prometheus/prometheus-entrypoint.sh"]
    command:
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - ./prometheus-entrypoint.sh:/etc/prometheus/prometheus-entrypoint.sh:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
      - fittracker-network
    depends_on:
      - alertmanager
      - blackbox-exporter

  # Alertmanager — маршрутизация алертов (Telegram)
  alertmanager:
    image: prom/alertmanager:v0.27.1
    container_name: fittracker-alertmanager
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -z "$$TELEGRAM_CHAT_ID" ]; then
          echo "alertmanager: set TELEGRAM_CHAT_ID in the environment (e.g. .env next to compose)." >&2
          exit 1
        fi
        mkdir -p /secrets
        umask 077
        printf '%s' "$$TELEGRAM_BOT_TOKEN" > /secrets/bot_token
        sed "s/CHAT_ID_PLACEHOLDER/$$TELEGRAM_CHAT_ID/" /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.effective.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.effective.yml --storage.path=/alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring

  # Blackbox exporter — HTTP probes (readiness)
  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.25.0
    container_name: fittracker-blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/config/blackbox.yml"
    volumes:
      - ./blackbox.yml:/config/blackbox.yml:ro
    networks:
      - monitoring
      - fittracker-network

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: fittracker-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://127.0.0.1:3001}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus

  # Node Exporter - System metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: fittracker-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring

  # cAdvisor - Container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: fittracker-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - monitoring

  # Loki - Log aggregation (optional)
  loki:
    image: grafana/loki:latest
    container_name: fittracker-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    networks:
      - monitoring

  # Promtail - Log collector (optional)
  promtail:
    image: grafana/promtail:latest
    container_name: fittracker-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:

networks:
  monitoring:
    driver: bridge
  fittracker-network:
    external: true
