# Alertmanager — уведомления в Telegram.
#
# Перед запуском контейнера docker-compose подставляет chat_id из TELEGRAM_CHAT_ID
# (строка CHAT_ID_PLACEHOLDER заменяется через sed в entrypoint сервиса alertmanager).
# TELEGRAM_BOT_TOKEN пишется в /secrets/bot_token из переменной окружения.
#
# Требуемые переменные окружения (см. docker-compose.monitoring.yml):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by: ["alertname"]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /secrets/bot_token
        chat_id: CHAT_ID_PLACEHOLDER
        send_resolved: true
        parse_mode: HTML
