services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fittracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fittracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fittracker_password}
      POSTGRES_DB: ${POSTGRES_DB:-fittracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fittracker} -d ${POSTGRES_DB:-fittracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fittracker-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fittracker-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fittracker-network

  # Backend API
  migrator:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fittracker-migrator
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
    volumes:
      - ./backend:/backend
      - ./database/migrations:/migrations
    command:
      [
        "sh",
        "-c",
        "python /backend/tools/bootstrap_alembic_version.py /migrations/alembic.ini && python -m alembic -c /migrations/alembic.ini upgrade head",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fittracker-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fittracker-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - REDIS_URL=redis://redis:6379/0
      - ALEMBIC_INI_PATH=/migrations/alembic.ini
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Keep empty here so backend/.env can control it (env_ignore_empty=true)
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-false}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      # Keep empty here so backend/.env can control it (env_ignore_empty=true)
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./backend:/app
      - ./database/migrations:/migrations:ro
      - /app/__pycache__
    ports:
      - "18000:8000"
    # Readiness probe: checks DB, Redis, and external service connectivity.
    # Container receives traffic only when all dependencies are healthy.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fittracker-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fittracker-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api/v1}
      - VITE_ADMIN_USER_IDS=${VITE_ADMIN_USER_IDS:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-${ENVIRONMENT:-development}}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_DIST=${SENTRY_DIST:-}
    ports:
      - "18080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fittracker-network

volumes:
  postgres_data:
  redis_data:

networks:
  fittracker-network:
    driver: bridge
