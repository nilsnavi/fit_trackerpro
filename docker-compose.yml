version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fittracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fittracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fittracker_password}
      POSTGRES_DB: ${POSTGRES_DB:-fittracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fittracker} -d ${POSTGRES_DB:-fittracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fittracker-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fittracker-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fittracker-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fittracker-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-fittracker}:${POSTGRES_PASSWORD:-fittracker_password}@postgres:5432/${POSTGRES_DB:-fittracker}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-http://localhost:3000}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DEBUG=${DEBUG:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import json,sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health', timeout=5); d=json.load(r); sys.exit(0 if d.get('status')=='healthy' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fittracker-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fittracker-frontend
    restart: unless-stopped
    environment:
      - API_URL=${API_URL:-http://localhost:8000/api/v1}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fittracker-network

volumes:
  postgres_data:
  redis_data:

networks:
  fittracker-network:
    driver: bridge
