workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

stages:
  - test
  - db_migrations

lint_backend:
  stage: test
  image: python:3.12-slim
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements/dev.txt
    - ruff --version
    - ruff check backend/app
    - python -m compileall -q backend/app

backend_dep_consistency:
  stage: test
  image: python:3.12-slim
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements/dev.txt
    - python -m pip check

backend_security_audit:
  stage: test
  image: python:3.12-slim
  allow_failure: true
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install pip-audit
    - pip-audit -r backend/requirements/dev.txt --progress-spinner off

unit_backend:
  stage: test
  needs:
    - lint_backend
    - backend_dep_consistency
  image: python:3.12-slim
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements/dev.txt
    - cd backend
    - pytest --junitxml=pytest-report.xml
    - python tools/check_coverage_thresholds.py coverage.xml
    - python tools/coverage_baseline.py check coverage.xml
  coverage: '/TOTAL.*\s(\d+)%/'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - backend/htmlcov/
      - backend/coverage.xml
      - backend/pytest-report.xml
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
      junit: backend/pytest-report.xml

unit_frontend:
  stage: test
  image: node:20-bookworm
  cache:
    key: "npm-cache"
    paths:
      - frontend/.npm/
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/frontend/.npm"
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm run lint
    - npm run typecheck
    - npm run test:ci
    - npm run coverage:baseline:check
  coverage: '/All files[^|]*\|[^|]*\s+(\d+)%/'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml

bundle_budget_frontend:
  stage: test
  image: node:20-bookworm
  cache:
    key: "npm-cache"
    paths:
      - frontend/.npm/
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/frontend/.npm"
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - BUNDLE_STATS=1 npm run build
    - npm run bundle:check
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/bundle-report.md
      - frontend/bundle-report.json
      - frontend/dist/bundle-stats.json

e2e_frontend:
  stage: test
  image: node:20-bookworm
  variables:
    # Cache browsers between pipeline runs.
    PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  cache:
    key: "playwright-browsers"
    paths:
      - .cache/ms-playwright/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npx playwright install --with-deps chromium
    - npm run e2e:ci
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/playwright-report/
      - frontend/test-results/

e2e_frontend_workout_flows:
  stage: test
  image: node:20-bookworm
  variables:
    PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  cache:
    key: "playwright-browsers"
    paths:
      - .cache/ms-playwright/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npx playwright install --with-deps chromium
    - npm run e2e:ci:workout-flows
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/playwright-report/
      - frontend/test-results/

e2e_frontend_regression:
  stage: test
  image: node:20-bookworm
  variables:
    PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  cache:
    key: "playwright-browsers"
    paths:
      - .cache/ms-playwright/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npx playwright install --with-deps chromium
    - npm run e2e:ci:regression
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/playwright-report/
      - frontend/test-results/

# Mobile E2E (Telegram Mini App hot paths)
e2e_frontend_mobile:
  stage: test
  image: node:20-bookworm
  variables:
    PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  cache:
    key: "playwright-browsers"
    paths:
      - .cache/ms-playwright/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npx playwright install --with-deps chromium
    - npm run e2e:ci:mobile
  artifacts:
