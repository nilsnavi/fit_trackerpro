stages:
  - test

unit_backend:
  stage: test
  image: python:3.12-slim
  cache:
    key: "pip-cache"
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python --version
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements/dev.txt
    - cd backend
    - pytest
    - python tools/check_coverage_thresholds.py coverage.xml
    - python tools/coverage_baseline.py check coverage.xml
  coverage: '/TOTAL.*\s(\d+)%/'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - backend/htmlcov/
      - backend/coverage.xml
    reports:
      cobertura: backend/coverage.xml

unit_frontend:
  stage: test
  image: node:20-bookworm
  cache:
    key: "npm-cache"
    paths:
      - frontend/.npm/
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/frontend/.npm"
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm run test:ci
    - npm run coverage:baseline:check
  coverage: '/All files[^|]*\|[^|]*\s+(\d+)%/'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/coverage/
    reports:
      cobertura: frontend/coverage/cobertura-coverage.xml

e2e_frontend:
  stage: test
  image: node:20-bookworm
  variables:
    # Cache browsers between pipeline runs.
    PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  cache:
    key: "playwright-browsers"
    paths:
      - .cache/ms-playwright/
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npx playwright install --with-deps chromium
    - npm run e2e:ci
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - frontend/playwright-report/
      - frontend/test-results/

