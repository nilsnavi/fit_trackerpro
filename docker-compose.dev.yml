services:
  edge:
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro

  backend:
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]

  frontend:
    # Dev mode: Vite HMR inside container for automatic frontend updates.
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ]; then npm ci --legacy-peer-deps; fi && npm run dev -- --host 0.0.0.0 --port 5173",
      ]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "18081:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  frontend_node_modules:
