services:
  backend:
    command:
      [
        "gunicorn",
        "-k",
        "uvicorn.workers.UvicornWorker",
        "-w",
        "1",
        "-b",
        "0.0.0.0:8000",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
        "--capture-output",
        "--enable-stdio-inheritance",
        "app.main:app",
      ]

  # Single public entrypoint (routes / -> frontend, /api -> backend)
  edge:
    image: caddy:2-alpine
    container_name: fittracker-edge
    restart: unless-stopped
    environment:
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,backend,frontend,postgres,redis,edge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fittracker-network

  # Public HTTPS URL for Telegram Mini App and API via Cloudflare Tunnel.
  # Cloudflare dashboard public hostname must route https://fittrackpro.ru -> http://edge:80.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: fittracker-cloudflared
    restart: unless-stopped
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "--protocol",
        "http2",
        "run",
        "--token",
        "${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required}",
      ]
    environment:
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,backend,frontend,postgres,redis,edge
      - no_proxy=localhost,127.0.0.1,backend,frontend,postgres,redis,edge
    depends_on:
      - edge
    networks:
      - fittracker-network

