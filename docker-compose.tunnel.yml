services:
  # Single public entrypoint (routes / -> frontend, /api -> backend)
  edge:
    image: caddy:2-alpine
    container_name: fittracker-edge
    restart: unless-stopped
    environment:
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,backend,frontend,postgres,redis,edge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fittracker-network

  # Public HTTPS URLs for Telegram Mini App and API via ngrok
  tunnel:
    image: ngrok/ngrok:latest
    container_name: fittracker-ngrok
    restart: unless-stopped
    command: start --all --config /etc/ngrok.yml
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,backend,frontend,.ngrok.io,.ngrok-free.app,.ngrok.com,tunnel.ngrok.com
      - no_proxy=localhost,127.0.0.1,backend,frontend,.ngrok.io,.ngrok-free.app,.ngrok.com,tunnel.ngrok.com
    volumes:
      - ./ngrok.fittracker.yml:/etc/ngrok.yml:ro
    depends_on:
      - edge
    networks:
      - fittracker-network

