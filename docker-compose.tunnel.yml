services:
  # Public HTTPS URLs for Telegram Mini App and API via ngrok
  tunnel:
    image: ngrok/ngrok:latest
    container_name: fittracker-ngrok
    restart: unless-stopped
    command: start --all --config /etc/ngrok.yml
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
      - ALL_PROXY=
      - NO_PROXY=localhost,127.0.0.1,backend,frontend
    volumes:
      - ./ngrok.fittracker.yml:/etc/ngrok.yml:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fittracker-network

