# Зависимости Python задаются только в requirements/*.txt (см. README).
# backend/requirements.txt подключает dev-набор для локальной разработки;
# Docker/production используют requirements/prod.txt.

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501", "B008"]

[tool.ruff.format]
quote-style = "single"

