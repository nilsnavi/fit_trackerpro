name: Test

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  POSTGRES_IMAGE: "postgres:15-alpine"

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Enforce frontend coverage baseline (no regressions)
        run: npm run coverage:baseline:check

      - name: Build (emit bundle stats)
        run: BUNDLE_STATS=1 npm run build

      - name: Enforce bundle performance budgets
        run: npm run bundle:check

      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-budget-report
          path: |
            ./frontend/bundle-report.md
            ./frontend/bundle-report.json
            ./frontend/dist/bundle-stats.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  e2e:
    name: E2E MVP golden path (Playwright + compose)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker compose up (E2E stack)
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API ready
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:28000/api/v1/system/ready" >/dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API not ready after 120s" >&2
          docker compose -f docker-compose.e2e.yml ps >&2
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run MVP golden path E2E
        working-directory: ./frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          VITE_API_URL: http://127.0.0.1:28000/api/v1
        run: npx playwright test e2e/mvp-golden-path.spec.ts --project=chromium

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-mvp-playwright-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

  e2e-golden-path:
    name: E2E golden path (PR → main)
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup test stack (Docker)
        run: bash scripts/e2e-setup.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run golden path E2E
        working-directory: ./frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          VITE_API_URL: http://127.0.0.1:28000/api/v1
          E2E_TELEGRAM_BOT_TOKEN: test_token_for_e2e
        run: npm run e2e:golden-path

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-golden-path-playwright-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

  e2e-workout-flows:
    name: E2E Workout Flows
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start E2E stack
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:28000/api/v1/system/health && exit 0
            sleep 2
          done; exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tagged workout-flow regression suite
        run: npm run e2e:ci:workout-flows

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-workout-flows-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

      - name: Tear down E2E stack
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml down -v

  e2e-regression:
    name: E2E Full Regression
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start E2E stack
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:28000/api/v1/system/health && exit 0
            sleep 2
          done; exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full @regression suite
        run: npm run e2e:ci:regression

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-regression-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

      - name: Tear down E2E stack
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml down -v

  e2e-playwright-default:
    name: E2E Playwright (default suite)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start E2E stack
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:28000/api/v1/system/health && exit 0
            sleep 2
          done; exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run default Playwright CI suite
        run: npm run e2e:ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-default-suite-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

      - name: Tear down E2E stack
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml down -v

  e2e-playwright-mobile:
    name: E2E Playwright (mobile projects)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start E2E stack
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:28000/api/v1/system/health && exit 0
            sleep 2
          done; exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run mobile-tagged Playwright suite
        run: npm run e2e:ci:mobile

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-mobile-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

      - name: Tear down E2E stack
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml down -v

  e2e-mvp-golden-path:
    name: E2E MVP golden path (mvp-regression spec)
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start E2E stack
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:28000/api/v1/system/health && exit 0
            sleep 2
          done; exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run MVP regression spec (GitLab parity gate)
        run: npm run e2e:mvp

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-mvp-golden-path-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results

      - name: Tear down E2E stack
        if: always()
        working-directory: .
        run: docker compose -f docker-compose.e2e.yml down -v

  db-migrations-fresh:
    name: DB migrations (fresh database)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://fittracker:fittracker_ci_password@127.0.0.1:5432/fittracker_test
      DATABASE_URL_SYNC: postgresql+psycopg2://fittracker:fittracker_ci_password@127.0.0.1:5432/fittracker_test
      SECRET_KEY: ci-test-secret-key-not-used-in-production-32chars
      TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      TELEGRAM_WEBAPP_URL: https://test.example.com
      DEBUG: "true"
    services:
      postgres:
        image: ${{ env.POSTGRES_IMAGE }}
        env:
          POSTGRES_DB: fittracker_test
          POSTGRES_USER: fittracker
          POSTGRES_PASSWORD: fittracker_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fittracker -d fittracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/dev.txt

      - name: Validate migration chain integrity
        run: python backend/tools/test_migrations.py --validate-chain

      - name: Wait for Postgres
        run: |
          python - <<'PYEOF'
          import time
          import sys

          import psycopg2

          for i in range(30):
              try:
                  psycopg2.connect(
                      dbname="fittracker_test",
                      user="fittracker",
                      password="fittracker_ci_password",
                      host="127.0.0.1",
                      port=5432,
                  ).close()
                  print("Postgres ready")
                  sys.exit(0)
              except Exception:
                  time.sleep(1)
          print("Postgres not ready after 30s", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Apply all migrations (clean DB)
        working-directory: database/migrations
        run: alembic upgrade head

      - name: Confirm alembic_version at HEAD
        run: |
          python - <<'PYEOF'
          import psycopg2

          conn = psycopg2.connect(
              dbname="fittracker_test",
              user="fittracker",
              password="fittracker_ci_password",
              host="127.0.0.1",
              port=5432,
          )
          cur = conn.cursor()
          cur.execute("SELECT version_num FROM alembic_version")
          row = cur.fetchone()
          assert row is not None, "alembic_version table is empty after upgrade head"
          print(f"HEAD revision confirmed: {row[0]}")
          conn.close()
          PYEOF

  db-migrations-rollback:
    name: DB migrations (rollback round-trip)
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://fittracker:fittracker_ci_password@127.0.0.1:5432/fittracker_test
      DATABASE_URL_SYNC: postgresql+psycopg2://fittracker:fittracker_ci_password@127.0.0.1:5432/fittracker_test
      SECRET_KEY: ci-test-secret-key-not-used-in-production-32chars
      TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
      TELEGRAM_WEBAPP_URL: https://test.example.com
      DEBUG: "true"
    services:
      postgres:
        image: ${{ env.POSTGRES_IMAGE }}
        env:
          POSTGRES_DB: fittracker_test
          POSTGRES_USER: fittracker
          POSTGRES_PASSWORD: fittracker_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fittracker -d fittracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/dev.txt

      - name: Wait for Postgres
        run: |
          python - <<'PYEOF'
          import time
          import sys

          import psycopg2

          for i in range(30):
              try:
                  psycopg2.connect(
                      dbname="fittracker_test",
                      user="fittracker",
                      password="fittracker_ci_password",
                      host="127.0.0.1",
                      port=5432,
                  ).close()
                  print("Postgres ready")
                  sys.exit(0)
              except Exception:
                  time.sleep(1)
          print("Postgres not ready after 30s", file=sys.stderr)
          sys.exit(1)
          PYEOF

      - name: Upgrade, downgrade, and round-trip
        working-directory: database/migrations
        run: |
          set -euo pipefail
          alembic upgrade head
          echo "Phase 1 PASSED: upgrade head OK"
          alembic downgrade -1
          echo "Phase 2 PASSED: downgrade -1 OK"
          alembic downgrade base
          echo "Phase 3 PASSED: downgrade base OK"
          alembic upgrade head
          echo "Phase 4 PASSED: upgrade head after full rollback OK"

      - name: Confirm alembic_version after round-trip
        run: |
          python - <<'PYEOF'
          import psycopg2

          conn = psycopg2.connect(
              dbname="fittracker_test",
              user="fittracker",
              password="fittracker_ci_password",
              host="127.0.0.1",
              port=5432,
          )
          cur = conn.cursor()
          cur.execute("SELECT version_num FROM alembic_version")
          row = cur.fetchone()
          assert row is not None, "alembic_version empty after round-trip"
          print(f"Round-trip confirmed. Final revision: {row[0]}")
          conn.close()
          PYEOF

  api-contract:
    name: API Contract (OpenAPI drift)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install backend dependencies (for OpenAPI export)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Check API contract drift
        run: npm run api:contract:check
        working-directory: ./frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    # Shared env for all backend test steps — DB, Redis, secrets, feature flags
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      DATABASE_URL_SYNC: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-for-ci-only
      TELEGRAM_BOT_TOKEN: test-token
      TELEGRAM_WEBAPP_URL: https://test.example.com
      ENVIRONMENT: test
      DEBUG: true

    services:
      postgres:
        image: ${{ env.POSTGRES_IMAGE }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Verify Python dependency graph (pip check)
        run: python -m pip check

      - name: Backend lint (ruff)
        run: ruff check app

      - name: Compile Python sources (syntax / import graph sanity)
        run: python -m compileall -q app

      - name: Run tests with coverage
        run: pytest

      - name: Enforce critical package coverage thresholds (coverage.xml)
        run: python tools/check_coverage_thresholds.py coverage.xml

      - name: Enforce backend coverage baseline (no regressions)
        run: python tools/coverage_baseline.py check coverage.xml

      - name: Enforce critical module coverage (settings + telegram env)
        run: |
          pytest app/tests/test_config_validation.py app/tests/test_env_consistency.py \
            --cov=app/settings \
            --cov-fail-under=80 \
            --no-header -q --tb=short

      - name: Enforce zero-coverage guard (workout domain + middleware)
        run: |
          python -m coverage report \
            --include="app/domain/workout_template.py,app/domain/workout_log.py,app/domain/workout_set.py,app/middleware/*" \
            --fail-under=40

      - name: Reference data seed check
        env:
          REFERENCE_DATA_DIR: reference_data
        run: |
          python -m app.cli.seed_reference_data apply --dry-run

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  docker-smoke:
    name: Docker Smoke (build only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag fittracker-backend:smoke \
            .

      - name: Build frontend image
        run: |
          docker build \
            --file frontend/Dockerfile \
            --tag fittracker-frontend:smoke \
            ./frontend
