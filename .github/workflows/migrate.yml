name: Database Migration

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Migration command"
        required: true
        default: "upgrade"
        type: choice
        options:
          - upgrade
          - downgrade
          - revision
          - status
      revision:
        description: "Revision (for upgrade/downgrade/revision)"
        required: false
        default: "head"
        type: string
      message:
        description: "Migration message (for revision only)"
        required: false
        type: string

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC }}

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate migration downgrade methods
        run: |
          python3 <<'PY'
          import ast
          import sys
          from pathlib import Path

          def strip_docstrings_from_function_body(body: list[ast.stmt]) -> list[ast.stmt]:
              out = list(body)
              while out and isinstance(out[0], ast.Expr) and isinstance(
                  out[0].value, ast.Constant
              ) and isinstance(out[0].value.value, str):
                  out = out[1:]
              return out

          def downgrade_is_only_pass_or_ellipsis(body: list[ast.stmt]) -> bool:
              if not body:
                  return True
              for stmt in body:
                  if isinstance(stmt, ast.Pass):
                      continue
                  if (
                      isinstance(stmt, ast.Expr)
                      and isinstance(stmt.value, ast.Constant)
                      and stmt.value.value is Ellipsis
                  ):
                      continue
                  return False
              return True

          def find_downgrade(tree: ast.Module) -> ast.AsyncFunctionDef | ast.FunctionDef | None:
              for node in tree.body:
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      if node.name == "downgrade":
                          return node
              return None

          versions_dir = Path("database/migrations/versions")
          if not versions_dir.is_dir():
              print(f"::warning title=Migrations::Missing directory {versions_dir}")
              sys.exit(0)

          flagged: list[tuple[Path, str]] = []
          for path in sorted(versions_dir.glob("*.py")):
              if path.name.startswith("__"):
                  continue
              src = path.read_text(encoding="utf-8")
              try:
                  tree = ast.parse(src, filename=str(path))
              except SyntaxError as exc:
                  print(f"::warning title=Migrations::SyntaxError in {path}: {exc}")
                  continue

              # Skip empty __init__-style modules without downgrade
              fn = find_downgrade(tree)
              if fn is None:
                  flagged.append((path, "no downgrade() function found"))
                  continue

              eff = strip_docstrings_from_function_body(fn.body)
              if downgrade_is_only_pass_or_ellipsis(eff):
                  flagged.append((path, "downgrade() is empty or contains only pass / ..."))

          if flagged:
              banner = "=" * 72
              print(banner)
              print("WARNING: migration downgrade() is trivial or missing in some files.")
              print("Rollback via alembic downgrade may be impossible for these revisions.")
              print(banner)
              for p, reason in flagged:
                  line = f"{p}: {reason}"
                  print(line)
                  print(f"::warning title=Migrations::{line}")
              print(banner)
          else:
              print("OK: every version file defines a non-trivial downgrade().")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlalchemy alembic asyncpg psycopg2-binary

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup before migration
        if: github.event.inputs.command == 'upgrade' || github.event.inputs.command == 'downgrade'
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro
            mkdir -p backups
            docker exec fittracker-postgres pg_dump -U ${{ secrets.POSTGRES_USER }} ${{ secrets.POSTGRES_DB }} > backups/pre_migration_$(date +%Y%m%d_%H%M%S).sql
            echo "Backup created successfully"
          EOF

      - name: Run migration
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << EOF
            set -Eeuo pipefail
            cd ~/fittracker-pro
            
            case "${{ github.event.inputs.command }}" in
              upgrade)
                echo "Running upgrade to ${{ github.event.inputs.revision }}"
                docker-compose -f docker-compose.prod.yml exec -T backend alembic upgrade ${{ github.event.inputs.revision }}
                ;;
              downgrade)
                echo "Running downgrade to ${{ github.event.inputs.revision }}"
                docker-compose -f docker-compose.prod.yml exec -T backend alembic downgrade ${{ github.event.inputs.revision }}
                ;;
              revision)
                echo "Creating new revision: ${{ github.event.inputs.message }}"
                docker-compose -f docker-compose.prod.yml exec -T backend alembic revision --autogenerate -m "${{ github.event.inputs.message }}"
                ;;
              status)
                echo "Checking migration status"
                docker-compose -f docker-compose.prod.yml exec -T backend alembic current
                docker-compose -f docker-compose.prod.yml exec -T backend alembic history
                ;;
            esac
            
            echo "Migration completed successfully"
          EOF

      - name: Verify migration
        if: github.event.inputs.command == 'upgrade'
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro
            
            # Check if backend is still healthy
            if docker-compose -f docker-compose.prod.yml ps | grep -q "healthy"; then
              echo "Services are healthy after migration"
            else
              echo "Post-migration health check failed: expected at least one healthy service"
              docker-compose -f docker-compose.prod.yml ps
              exit 1
            fi
          EOF

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "Database migration failed! Check the workflow logs."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
