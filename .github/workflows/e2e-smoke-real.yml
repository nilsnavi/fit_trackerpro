name: E2E Smoke Real API

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  NODE_VERSION: '20'

jobs:
  smoke-real-api:
    name: Smoke Golden Path (no mocks)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
      E2E_TELEGRAM_INIT_DATA: ${{ secrets.E2E_TELEGRAM_INIT_DATA }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Validate smoke environment
        run: |
          set -Eeuo pipefail
          for key in E2E_BASE_URL E2E_API_BASE_URL E2E_TELEGRAM_INIT_DATA; do
            val="${!key:-}"
            if [ -z "${val}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke golden path (real API)
        run: npm run e2e:smoke:real

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-real-report
          path: |
            ./frontend/playwright-report
            ./frontend/test-results
