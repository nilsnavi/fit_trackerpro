# Production / staging deploy — explicit stages (DAG via needs:):
#   resolve-tag → build (release) or skip build (manual)
#   deploy-pipeline (reusable) → pre-deploy-validate → migrate → deploy → verify → record-stable | rollback → notify
#
# Staging and production share the same job graph via reusable workflow deploy-environment.yml;
# GitHub Environment (staging vs production) is selected per run (release → production).
name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: "Versioned image tag to deploy (e.g. v1.2.3 or main-abc1234), never latest"
        required: true
        type: string
      rollback_restore_db:
        description: "Restore DB from pre-deploy backup during rollback"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.event.release.tag_name || github.event.inputs.image_tag || github.sha }}-${{ github.event_name == 'release' && 'production' || github.event.inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Stage: resolve tag (always) — single source of truth for IMAGE_TAG downstream
  # ---------------------------------------------------------------------------
  resolve-tag:
    name: "Stage: resolve image tag"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      deploy_environment: ${{ steps.resolve.outputs.deploy_environment }}
    steps:
      - name: Resolve deploy image tag and target environment
        id: resolve
        run: |
          set -Eeuo pipefail
          DEPLOY_IMAGE_TAG=""
          if [ "${{ github.event_name }}" = "release" ]; then
            DEPLOY_IMAGE_TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          fi
          if [ -z "${DEPLOY_IMAGE_TAG}" ] || [ "${DEPLOY_IMAGE_TAG}" = "latest" ]; then
            echo "::error::Deploy requires a non-empty versioned tag (not 'latest'). Publish a GitHub Release or pass a tag (e.g. v1.2.3 or main-<sha>)."
            exit 1
          fi
          echo "image_tag=${DEPLOY_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            echo "deploy_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          fi

          echo "Deploying image tag: ${DEPLOY_IMAGE_TAG}"

  # ---------------------------------------------------------------------------
  # Stage: build — release publishes images; manual dispatch skips (uses GHCR tag)
  # ---------------------------------------------------------------------------
  build:
    name: "Stage: build"
    if: github.event_name == 'release'
    uses: ./.github/workflows/build-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      security-events: write

  build-skipped:
    name: "Stage: build (skipped — using existing images)"
    needs: [resolve-tag]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm pre-built images
        run: |
          echo "Manual deploy uses existing GHCR tags; no build in this run."
          echo "IMAGE_TAG=${{ needs.resolve-tag.outputs.image_tag }}"

  # ---------------------------------------------------------------------------
  # Stages: migrate → deploy → verify → record-stable | rollback → notify (shared)
  # ---------------------------------------------------------------------------
  deploy-pipeline:
    name: "Deploy pipeline (${{ needs.resolve-tag.outputs.deploy_environment }})"
    needs: [resolve-tag, build, build-skipped]
    if: |
      always() &&
      needs.resolve-tag.result == 'success' &&
      (
        (needs.build.result == 'success' && needs.build-skipped.result == 'skipped') ||
        (needs.build.result == 'skipped' && needs.build-skipped.result == 'success')
      )
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-environment.yml
    with:
      image_tag: ${{ needs.resolve-tag.outputs.image_tag }}
      deploy_environment: ${{ needs.resolve-tag.outputs.deploy_environment }}
      rollback_restore_db: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_restore_db || false }}
    secrets: inherit
