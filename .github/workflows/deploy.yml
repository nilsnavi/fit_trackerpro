name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: "Versioned image tag to deploy (e.g. v1.2.3 or main-abc1234), never latest"
        required: true
        type: string
      rollback_restore_db:
        description: "Restore DB from pre-deploy backup during rollback"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_DIR: ~/fittracker-pro
  # Production public hostname (set secrets.VITE_API_URL to https://fittrackpro.ru/api/v1)
  PRODUCTION_DOMAIN: fittrackpro.ru

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Resolve deploy image tag
        run: |
          set -Eeuo pipefail
          DEPLOY_IMAGE_TAG=""

          if [ "${{ github.event_name }}" = "release" ]; then
            DEPLOY_IMAGE_TAG="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_IMAGE_TAG="${{ inputs.image_tag }}"
          fi

          if [ -z "${DEPLOY_IMAGE_TAG}" ] || [ "${DEPLOY_IMAGE_TAG}" = "latest" ]; then
            echo "::error::Deploy requires a non-empty versioned tag (not 'latest'). Publish a GitHub Release or pass a tag (e.g. v1.2.3 or main-<sha>)."
            exit 1
          fi

          echo "DEPLOY_IMAGE_TAG=${DEPLOY_IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "Deploying image tag: ${DEPLOY_IMAGE_TAG}"

      - name: Sync infra files to server
        run: |
          set -Eeuo pipefail
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}/nginx"
          scp docker-compose.prod.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/docker-compose.prod.yml
          scp nginx/nginx.conf ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/nginx/nginx.conf

      - name: Deploy to server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            
            # Navigate to deploy directory
            cd ~/fittracker-pro || exit 1
            mkdir -p backups nginx/ssl nginx/logs
            
            PREVIOUS_IMAGE_TAG=""
            if [ -f .env ]; then
              # Keep previous runtime tag to enable deterministic rollback.
              if grep -qE '^IMAGE_TAG=' .env; then
                PREVIOUS_IMAGE_TAG="$(grep -E '^IMAGE_TAG=' .env | tail -n1 | cut -d'=' -f2-)"
              fi
            fi

            # Create .env file from secrets
            cat > .env << EOL
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBAPP_URL=${{ secrets.TELEGRAM_WEBAPP_URL }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_TELEGRAM_BOT_USERNAME=${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
          IMAGE_TAG=${{ env.DEPLOY_IMAGE_TAG }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOL

            # Persist rollback metadata for post-failure recovery.
            cat > .rollback-meta.env << EOL
          PREVIOUS_IMAGE_TAG=${PREVIOUS_IMAGE_TAG}
          TARGET_IMAGE_TAG=${{ env.DEPLOY_IMAGE_TAG }}
          DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOL
            
            mkdir -p backups

            # Backup database before migration (required)
            echo "Creating database backup..."
            DB_BACKUP_PATH="backups/backup_$(date +%Y%m%d_%H%M%S).sql"
            docker exec fittracker-postgres pg_dump -U ${{ secrets.POSTGRES_USER }} ${{ secrets.POSTGRES_DB }} > "${DB_BACKUP_PATH}"
            echo "DB_BACKUP_PATH=${DB_BACKUP_PATH}" >> .rollback-meta.env
            
            # Pull images for the resolved IMAGE_TAG (infra layers + app images)
            echo "Pulling container images..."
            docker-compose -f docker-compose.prod.yml pull
            
            # Run database migrations
            echo "Running database migrations..."
            docker-compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            
            # Deploy services
            echo "Deploying services..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Cleanup old images
            echo "Cleaning up..."
            docker image prune -f
            
            # Health check
            echo "Running health checks..."
            sleep 15
            
            # Check backend health (same JSON as GET /api/v1/system/health)
            if curl -fsS http://localhost:8000/health; then
              echo "Backend is healthy"
            else
              echo "Backend health check failed"
              exit 1
            fi

            # Check API version endpoint
            if curl -fsS http://localhost:8000/api/v1/system/version; then
              echo "Backend version endpoint is healthy"
            else
              echo "Backend version endpoint failed"
              exit 1
            fi

            # Minimal smoke check through reverse proxy
            if curl -fsS http://localhost/; then
              echo "Reverse proxy smoke check passed"
            else
              echo "Reverse proxy smoke check failed"
              exit 1
            fi
            
            echo "Deployment completed successfully!"
          EOF

  smoke:
    name: Post-deploy Smoke Validation
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - name: Run production smoke checks
        env:
          API_BASE_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -Eeuo pipefail
          echo "Production domain (reference): ${PRODUCTION_DOMAIN}"
          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::VITE_API_URL secret is empty — cannot run post-deploy smoke checks."
            exit 1
          fi
          API_BASE_TRIMMED="${API_BASE_URL%/}"
          # Public site origin (SPA); API is ${API_BASE_TRIMMED} e.g. https://host/api/v1
          FRONTEND_BASE_URL="${API_BASE_TRIMMED%/api/v1}"
          FRONTEND_BASE_URL="${FRONTEND_BASE_URL%/}"

          HEALTH_URL="${API_BASE_TRIMMED}/system/health"
          VERSION_URL="${API_BASE_TRIMMED}/version"
          # Nginx exposes GET /health -> same payload as system health (full stack path).
          NGINX_HEALTH_URL="${FRONTEND_BASE_URL}/health"
          DOMAIN_URL="${API_BASE_TRIMMED}/workouts/templates?page=1&page_size=1"

          smoke_check() {
            local name="$1"
            local url="$2"
            local expected_codes="$3"
            local max_attempts=12
            local status_code=""

            echo "Smoke check: ${name} -> ${url} (expected: ${expected_codes})"

            for attempt in $(seq 1 "$max_attempts"); do
              set +e
              status_code="$(curl --silent --show-error --location --output /dev/null --write-out "%{http_code}" "$url")"
              curl_exit=$?
              set -e
              if [ "$curl_exit" -ne 0 ]; then
                status_code="${status_code:-000}"
              fi
              if [[ " ${expected_codes} " == *" ${status_code} "* ]]; then
                echo "Smoke check passed: ${name} (status ${status_code})"
                return 0
              fi

              echo "Attempt ${attempt}/${max_attempts} failed for ${name}: status ${status_code}"
              sleep 5
            done

            echo "Smoke check failed: ${name}. Last status: ${status_code}, expected: ${expected_codes}"
            return 1
          }

          # Post-deploy smoke: backend health, frontend availability, basic API connectivity.
          # Failure of any check fails this job and triggers rollback (needs: smoke).

          smoke_check "backend health (GET /api/v1/system/health)" "${HEALTH_URL}" "200"
          curl -fsS "${HEALTH_URL}" | jq -e '.status == "healthy"' >/dev/null
          echo "Health JSON validated: status=healthy"

          smoke_check "nginx→backend health (GET /health)" "${NGINX_HEALTH_URL}" "200"
          curl -fsS "${NGINX_HEALTH_URL}" | jq -e '.status == "healthy"' >/dev/null

          smoke_check "API connectivity (GET /api/v1/system/version)" "${VERSION_URL}" "200"
          curl -fsS "${VERSION_URL}" | jq -e '.version != null' >/dev/null
          echo "Version JSON validated"

          smoke_check "frontend (site root HTML)" "${FRONTEND_BASE_URL}/" "200"
          curl -fsS "${FRONTEND_BASE_URL}/" | grep -qiE '<!DOCTYPE[[:space:]]+html|<html[[:space:]>]'
          echo "Frontend HTML validated"

          # Domain endpoint can be auth-protected in production, so 401/403 is acceptable.
          smoke_check "protected API route /workouts/templates" "${DOMAIN_URL}" "200 401 403"

  record-stable:
    name: Record last stable image tags
    runs-on: ubuntu-latest
    needs: [deploy, smoke]
    if: ${{ needs.deploy.result == 'success' && needs.smoke.result == 'success' }}
    environment: production

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Write .last-stable-deploy.env on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro || exit 1
            if [ ! -f .rollback-meta.env ]; then
              echo "Warning: .rollback-meta.env missing — skipping last-stable snapshot"
              exit 0
            fi
            set -a
            # shellcheck disable=SC1091
            source .rollback-meta.env
            set +a
            {
              echo "LAST_STABLE_IMAGE_TAG=${TARGET_IMAGE_TAG:-}"
              echo "LAST_STABLE_PREVIOUS_TAG=${PREVIOUS_IMAGE_TAG:-}"
              echo "LAST_STABLE_RECORDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            } > .last-stable-deploy.env
            echo "Recorded last successful deploy tags in .last-stable-deploy.env"
          EOF

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke]
    if: ${{ always() && (needs.deploy.result == 'failure' || needs.smoke.result == 'failure') }}

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rollback deployment
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro
            
            PREVIOUS_IMAGE_TAG=""
            DB_BACKUP_PATH=""
            if [ -f .rollback-meta.env ]; then
              # shellcheck disable=SC1091
              source .rollback-meta.env
            fi

            if [ -z "${PREVIOUS_IMAGE_TAG}" ]; then
              echo "Error: No previous IMAGE_TAG in .rollback-meta.env — cannot roll back app images (first deploy or missing metadata)."
              exit 1
            fi

            if [ -f .env ]; then
              sed -i -E "s|^IMAGE_TAG=.*|IMAGE_TAG=${PREVIOUS_IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${PREVIOUS_IMAGE_TAG}" > .env
              echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            fi

            echo "Rolling back to image tag: ${PREVIOUS_IMAGE_TAG}"
            docker-compose -f docker-compose.prod.yml pull backend frontend
            docker-compose -f docker-compose.prod.yml up -d

            if [ "${{ github.event_name == 'workflow_dispatch' && inputs.rollback_restore_db == true }}" = "true" ]; then
              if [ -n "${DB_BACKUP_PATH}" ] && [ -f "${DB_BACKUP_PATH}" ]; then
                echo "Restoring DB from pre-deploy backup: ${DB_BACKUP_PATH}"
                docker-compose -f docker-compose.prod.yml up -d postgres
                sleep 8
                docker exec -i fittracker-postgres psql -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} < "${DB_BACKUP_PATH}"
              else
                echo "rollback_restore_db=true, but backup not found: ${DB_BACKUP_PATH}"
                exit 1
              fi
            else
              echo "DB restore skipped (rollback_restore_db=false)"
            fi

            sleep 15
            curl -fsS http://localhost:8000/health > /dev/null
            curl -fsS http://localhost:8000/api/v1/system/version > /dev/null
            curl -fsS http://localhost/ > /dev/null
            echo "Rollback completed and health checks passed"
          EOF

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [deploy, smoke, rollback, record-stable]
    if: ${{ always() }}

    steps:
      - name: Notify on success
        if: ${{ needs.deploy.result == 'success' && needs.smoke.result == 'success' }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "FitTracker Pro deployed successfully to production and smoke checks passed!"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: ${{ needs.deploy.result == 'failure' || needs.smoke.result == 'failure' || needs.rollback.result == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "FitTracker Pro deployment or smoke validation failed. Rollback status: ${{ needs.rollback.result }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
