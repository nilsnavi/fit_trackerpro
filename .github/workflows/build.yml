# Stage: build — push main builds images for continuous delivery to GHCR.
# Release images are built in the deploy workflow (after this file, see deploy.yml).
name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build-images:
    uses: ./.github/workflows/build-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      security-events: write
