# Shared deploy stages for a single GitHub Environment (staging or production).
# Invoked from deploy.yml after resolve-tag and build.
name: Deploy environment (reusable)

on:
  workflow_call:
    inputs:
      image_tag:
        description: Versioned image tag to deploy
        required: true
        type: string
      deploy_environment:
        description: GitHub Environment name (staging or production)
        required: true
        type: string
      rollback_restore_db:
        description: Restore DB from pre-deploy backup during rollback
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEPLOY_DIR: ~/fittracker-pro

jobs:
  # Fail fast before SSH: required secrets, compose interpolation, nginx syntax.
  pre-deploy-validate:
    name: "Stage: pre-deploy validation (${{ inputs.deploy_environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate required secrets and image tag
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBAPP_URL: ${{ secrets.TELEGRAM_WEBAPP_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TELEGRAM_BOT_USERNAME: ${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -Eeuo pipefail
          missing=0
          for name in POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB SECRET_KEY TELEGRAM_BOT_TOKEN TELEGRAM_WEBAPP_URL ALLOWED_ORIGINS VITE_API_URL VITE_TELEGRAM_BOT_USERNAME SSH_PRIVATE_KEY DEPLOY_HOST DEPLOY_USER; do
            eval "val=\${$name:-}"
            if [ -z "${val}" ]; then
              echo "::error::Required secret or configuration ${name} is empty (set it in GitHub Environment: ${{ inputs.deploy_environment }})"
              missing=1
            fi
          done
          if [ -z "${DEPLOY_IMAGE_TAG:-}" ] || [ "${DEPLOY_IMAGE_TAG}" = "latest" ]; then
            echo "::error::IMAGE_TAG must be non-empty and must not be 'latest' (got: '${DEPLOY_IMAGE_TAG:-}')"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi
          echo "Required secrets and IMAGE_TAG are present."

      - name: Render docker compose (prod)
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBAPP_URL: ${{ secrets.TELEGRAM_WEBAPP_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          API_URL: ${{ secrets.VITE_API_URL }}
          TELEGRAM_BOT_USERNAME: ${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
        run: |
          set -Eeuo pipefail
          docker compose -f docker-compose.prod.yml config --quiet
          echo "docker-compose.prod.yml renders successfully."

      - name: Validate nginx configuration syntax
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/nginx-predeploy-ssl
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout /tmp/nginx-predeploy-ssl/privkey.pem \
            -out /tmp/nginx-predeploy-ssl/fullchain.pem \
            -subj "/CN=localhost"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "/tmp/nginx-predeploy-ssl:/etc/nginx/ssl:ro" \
            nginx:alpine@sha256:e7257f1ef28ba17cf7c248cb8ccf6f0c6e0228ab9c315c152f9c203cd34cf6d1 \
            nginx -t
          echo "nginx.conf is syntactically valid."

  migrate:
    name: "Stage: migrate (${{ inputs.deploy_environment }})"
    needs: [pre-deploy-validate]
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      DEPLOY_IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}

      - name: Sync infra files to server
        run: |
          set -Eeuo pipefail
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p ${{ env.DEPLOY_DIR }}/nginx"
          scp docker-compose.prod.yml ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/docker-compose.prod.yml
          scp nginx/nginx.conf ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/nginx/nginx.conf

      - name: Migrate database (backup, pull, alembic upgrade)
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail

            cd ~/fittracker-pro || exit 1
            mkdir -p backups nginx/ssl nginx/logs

            PREVIOUS_IMAGE_TAG=""
            if [ -f .env ]; then
              if grep -qE '^IMAGE_TAG=' .env; then
                PREVIOUS_IMAGE_TAG="$(grep -E '^IMAGE_TAG=' .env | tail -n1 | cut -d'=' -f2-)"
              fi
            fi

            cat > .env << EOL
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBAPP_URL=${{ secrets.TELEGRAM_WEBAPP_URL }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          API_URL=${{ secrets.VITE_API_URL }}
          TELEGRAM_BOT_USERNAME=${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}
          IMAGE_TAG=${{ env.DEPLOY_IMAGE_TAG }}
          GITHUB_REPOSITORY=${{ github.repository }}
          EOL

            cat > .rollback-meta.env << EOL
          PREVIOUS_IMAGE_TAG=${PREVIOUS_IMAGE_TAG}
          TARGET_IMAGE_TAG=${{ env.DEPLOY_IMAGE_TAG }}
          DEPLOY_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOL

            mkdir -p backups
            echo "Creating database backup..."
            DB_BACKUP_PATH="backups/backup_$(date +%Y%m%d_%H%M%S).sql"
            docker exec fittracker-postgres pg_dump -U ${{ secrets.POSTGRES_USER }} ${{ secrets.POSTGRES_DB }} > "${DB_BACKUP_PATH}"
            echo "DB_BACKUP_PATH=${DB_BACKUP_PATH}" >> .rollback-meta.env

            echo "Pulling container images..."
            docker-compose -f docker-compose.prod.yml pull

            echo "Running database migrations..."
            docker-compose -f docker-compose.prod.yml run --rm backend alembic upgrade head

            echo "Migration stage completed successfully"
          EOF

  deploy:
    name: "Stage: deploy (${{ inputs.deploy_environment }})"
    needs: [migrate]
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}

      - name: Deploy services and run on-host health checks
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro || exit 1

            echo "Deploying services..."
            docker-compose -f docker-compose.prod.yml up -d

            echo "Cleaning up..."
            docker image prune -f

            echo "Running health checks..."
            sleep 15

            if curl -fsS http://localhost:8000/health; then
              echo "Backend is healthy"
            else
              echo "Backend health check failed"
              exit 1
            fi

            if curl -fsS http://localhost:8000/api/v1/system/version; then
              echo "Backend version endpoint is healthy"
            else
              echo "Backend version endpoint failed"
              exit 1
            fi

            if curl -fsS http://localhost/; then
              echo "Reverse proxy smoke check passed"
            else
              echo "Reverse proxy smoke check failed"
              exit 1
            fi

            echo "Deploy stage completed successfully"
          EOF

  verify:
    name: "Stage: verify (${{ inputs.deploy_environment }})"
    runs-on: ubuntu-latest
    needs: [deploy]
    if: needs.deploy.result == 'success'
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Run smoke checks
        env:
          API_BASE_URL: ${{ secrets.VITE_API_URL }}
        run: |
          set -Eeuo pipefail
          echo "Environment: ${{ inputs.deploy_environment }}"
          if [ -z "${API_BASE_URL:-}" ]; then
            echo "::error::VITE_API_URL secret is empty — cannot run post-deploy smoke checks."
            exit 1
          fi
          API_BASE_TRIMMED="${API_BASE_URL%/}"
          FRONTEND_BASE_URL="${API_BASE_TRIMMED%/api/v1}"
          FRONTEND_BASE_URL="${FRONTEND_BASE_URL%/}"

          HEALTH_URL="${API_BASE_TRIMMED}/system/health"
          VERSION_URL="${API_BASE_TRIMMED}/version"
          NGINX_HEALTH_URL="${FRONTEND_BASE_URL}/health"
          DOMAIN_URL="${API_BASE_TRIMMED}/workouts/templates?page=1&page_size=1"

          smoke_check() {
            local name="$1"
            local url="$2"
            local expected_codes="$3"
            local max_attempts=12
            local status_code=""

            echo "Smoke check: ${name} -> ${url} (expected: ${expected_codes})"

            for attempt in $(seq 1 "$max_attempts"); do
              set +e
              status_code="$(curl --silent --show-error --location --output /dev/null --write-out "%{http_code}" "$url")"
              curl_exit=$?
              set -e
              if [ "$curl_exit" -ne 0 ]; then
                status_code="${status_code:-000}"
              fi
              if [[ " ${expected_codes} " == *" ${status_code} "* ]]; then
                echo "Smoke check passed: ${name} (status ${status_code})"
                return 0
              fi

              echo "Attempt ${attempt}/${max_attempts} failed for ${name}: status ${status_code}"
              sleep 5
            done

            echo "Smoke check failed: ${name}. Last status: ${status_code}, expected: ${expected_codes}"
            return 1
          }

          smoke_check "backend health (GET /api/v1/system/health)" "${HEALTH_URL}" "200"
          curl -fsS "${HEALTH_URL}" | jq -e '.status == "healthy"' >/dev/null
          echo "Health JSON validated: status=healthy"

          smoke_check "nginx→backend health (GET /health)" "${NGINX_HEALTH_URL}" "200"
          curl -fsS "${NGINX_HEALTH_URL}" | jq -e '.status == "healthy"' >/dev/null

          smoke_check "API connectivity (GET /api/v1/system/version)" "${VERSION_URL}" "200"
          curl -fsS "${VERSION_URL}" | jq -e '.version != null' >/dev/null
          echo "Version JSON validated"

          smoke_check "frontend (site root HTML)" "${FRONTEND_BASE_URL}/" "200"
          curl -fsS "${FRONTEND_BASE_URL}/" | grep -qiE '<!DOCTYPE[[:space:]]+html|<html[[:space:]>]'
          echo "Frontend HTML validated"

          smoke_check "protected API route /workouts/templates" "${DOMAIN_URL}" "200 401 403"

  record-stable:
    name: Record last stable image tags (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    needs: [migrate, deploy, verify]
    if: ${{ needs.migrate.result == 'success' && needs.deploy.result == 'success' && needs.verify.result == 'success' }}
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}

      - name: Write .last-stable-deploy.env on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro || exit 1
            if [ ! -f .rollback-meta.env ]; then
              echo "Warning: .rollback-meta.env missing — skipping last-stable snapshot"
              exit 0
            fi
            set -a
            # shellcheck disable=SC1091
            source .rollback-meta.env
            set +a
            {
              echo "LAST_STABLE_IMAGE_TAG=${TARGET_IMAGE_TAG:-}"
              echo "LAST_STABLE_PREVIOUS_TAG=${PREVIOUS_IMAGE_TAG:-}"
              echo "LAST_STABLE_RECORDED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            } > .last-stable-deploy.env
            echo "Recorded last successful deploy tags in .last-stable-deploy.env"
          EOF

  rollback:
    name: Rollback on Failure (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    needs: [migrate, deploy, verify]
    if: ${{ always() && (needs.migrate.result == 'failure' || needs.deploy.result == 'failure' || needs.verify.result == 'failure') }}
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH
        uses: ./.github/actions/setup-ssh-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}

      - name: Rollback deployment
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ~/fittracker-pro

            PREVIOUS_IMAGE_TAG=""
            DB_BACKUP_PATH=""
            if [ -f .rollback-meta.env ]; then
              # shellcheck disable=SC1091
              source .rollback-meta.env
            fi

            if [ -z "${PREVIOUS_IMAGE_TAG}" ]; then
              echo "Error: No previous IMAGE_TAG in .rollback-meta.env — cannot roll back app images (first deploy or missing metadata)."
              exit 1
            fi

            if [ -f .env ]; then
              sed -i -E "s|^IMAGE_TAG=.*|IMAGE_TAG=${PREVIOUS_IMAGE_TAG}|" .env
            else
              echo "IMAGE_TAG=${PREVIOUS_IMAGE_TAG}" > .env
              echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            fi

            echo "Rolling back to image tag: ${PREVIOUS_IMAGE_TAG}"
            docker-compose -f docker-compose.prod.yml pull backend frontend
            docker-compose -f docker-compose.prod.yml up -d

            if ${{ inputs.rollback_restore_db }}; then
              if [ -n "${DB_BACKUP_PATH}" ] && [ -f "${DB_BACKUP_PATH}" ]; then
                echo "Restoring DB from pre-deploy backup: ${DB_BACKUP_PATH}"
                docker-compose -f docker-compose.prod.yml up -d postgres
                sleep 8
                docker exec -i fittracker-postgres psql -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }} < "${DB_BACKUP_PATH}"
              else
                echo "rollback_restore_db=true, but backup not found: ${DB_BACKUP_PATH}"
                exit 1
              fi
            else
              echo "DB restore skipped (rollback_restore_db=false)"
            fi

            sleep 15
            curl -fsS http://localhost:8000/health > /dev/null
            curl -fsS http://localhost:8000/api/v1/system/version > /dev/null
            curl -fsS http://localhost/ > /dev/null
            echo "Rollback completed and health checks passed"
          EOF

  notify:
    name: Notify Deployment Result (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest
    needs: [pre-deploy-validate, migrate, deploy, verify, rollback, record-stable]
    if: ${{ always() }}

    steps:
      - name: Notify on success
        if: ${{ needs.pre-deploy-validate.result == 'success' && needs.deploy.result == 'success' && needs.verify.result == 'success' }}
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "FitTracker Pro deployed successfully to ${{ inputs.deploy_environment }} and smoke checks passed!"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify on failure
        if: ${{ needs.pre-deploy-validate.result == 'failure' || needs.migrate.result == 'failure' || needs.deploy.result == 'failure' || needs.verify.result == 'failure' || needs.rollback.result == 'failure' }}
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "FitTracker Pro deployment to ${{ inputs.deploy_environment }} or smoke validation failed. Rollback status: ${{ needs.rollback.result }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
