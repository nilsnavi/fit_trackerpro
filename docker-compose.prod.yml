version: '3.8'

# Infra images pinned by registry index digest (multi-arch). Bump when upgrading:
#   docker buildx imagetools inspect <image:tag> --format '{{json .Manifest.Digest}}'
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: fittracker-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: fittracker-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Backend API (GHCR: semver on release, or branch-sha from main — never :latest)
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fittracker-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:?TELEGRAM_WEBAPP_URL is required}
      - ENVIRONMENT=production
      - DEBUG=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      - SENTRY_DSN=${SENTRY_DSN}
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import json,sys,urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health', timeout=5); d=json.load(r); sys.exit(0 if d.get('status')=='healthy' else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-internal
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Frontend
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fittracker-frontend
    restart: always
    environment:
      - VITE_API_URL=${VITE_API_URL:-${API_URL:?API_URL is required}}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_DIST=${SENTRY_DIST:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine@sha256:e7257f1ef28ba17cf7c248cb8ccf6f0c6e0228ab9c315c152f9c203cd34cf6d1
    container_name: fittracker-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  postgres_data:
  redis_data:

networks:
  fittracker-network:
    driver: bridge
  backend-internal:
    driver: bridge
    internal: true
