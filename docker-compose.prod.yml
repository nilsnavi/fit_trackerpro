# Infra images pinned by registry index digest (multi-arch). Bump when upgrading:
#   docker buildx imagetools inspect <image:tag> --format '{{json .Manifest.Digest}}'

# -----------------------------------------------------------------------------
# Production hardening notes (keep deployment topology unchanged):
# - Prefer image-defined non-root users where possible.
# - Use `read_only` + `tmpfs` for stateless services (backend, edge nginx).
# - Drop Linux capabilities by default; add back only what is required.
# - Avoid sensitive bind mounts; use host dirs outside the repo via env overrides.
# -----------------------------------------------------------------------------

x-hardening-defaults: &hardening_defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  init: true

x-tmpfs-defaults: &tmpfs_defaults
  tmpfs:
    - /tmp

x-restart-defaults: &restart_defaults
  restart: unless-stopped
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine@sha256:fceb6f86328c36f2438fae3b851b0cc57c4a7e69a58c866d9ce24281f2cf0c9c
    container_name: fittracker-postgres
    <<: [*restart_defaults, *hardening_defaults, *tmpfs_defaults]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Backups directory MUST live outside the repo in production.
      # Override with BACKUPS_DIR=/absolute/path/on/host
      - ${BACKUPS_DIR:-./backups}:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: fittracker-redis
    <<: [*restart_defaults, *hardening_defaults, *tmpfs_defaults]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # One-shot Alembic migrations; backend waits until this exits successfully.
  migrator:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fittracker-migrator
    <<: [*hardening_defaults, *tmpfs_defaults]
    restart: "no"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - ENVIRONMENT=production
      - DEBUG=false
    command:
      [
        "sh",
        "-c",
        "python /app/tools/bootstrap_alembic_version.py /app/embedded_migrations/alembic.ini && python -m alembic -c /app/embedded_migrations/alembic.ini upgrade head",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-internal

  # Backend API (GHCR: semver on release, or branch-sha from main — never :latest)
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fittracker-backend
    <<: [*restart_defaults, *hardening_defaults, *tmpfs_defaults]
    read_only: true
    # Backend image already runs as non-root (`USER appuser` in Dockerfile).
    # Provide writable scratch locations via tmpfs.
    tmpfs:
      - /tmp
      - /app/logs
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:?TELEGRAM_WEBAPP_URL is required}
      - ENVIRONMENT=production
      - DEBUG=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      - SENTRY_DSN=${SENTRY_DSN}
      - TELEGRAM_BOT_ENABLED=false
      - ENABLE_PROMETHEUS_METRICS=true
    # Readiness probe: checks DB, Redis, and external service connectivity.
    # Container receives traffic only when all dependencies are healthy.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-internal
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Frontend
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fittracker-frontend
    <<: [*restart_defaults, *hardening_defaults, *tmpfs_defaults]
    # NOTE: do not set `read_only` here — frontend `startup.sh` writes `/usr/share/nginx/html/config.js`.
    environment:
      - VITE_API_URL=${VITE_API_URL:-${API_URL:?API_URL is required}}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBAPP_URL=${TELEGRAM_WEBAPP_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_DIST=${SENTRY_DIST:-}
    # Frontend healthcheck is self-contained (/healthz) — no backend dependency needed.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine@sha256:e7257f1ef28ba17cf7c248cb8ccf6f0c6e0228ab9c315c152f9c203cd34cf6d1
    container_name: fittracker-nginx
    <<: [*restart_defaults, *hardening_defaults, *tmpfs_defaults]
    read_only: true
    # Run as non-root and only allow binding to 80/443.
    user: "101:101" # nginx:nginx in nginx:alpine
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS certificates MUST live outside the repo in production.
      # Override with NGINX_SSL_DIR=/absolute/path/on/host
      - ${NGINX_SSL_DIR:-./nginx/ssl}:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - frontend
      - backend
    networks:
      - fittracker-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  fittracker-network:
    driver: bridge
  backend-internal:
    driver: bridge
    internal: true
